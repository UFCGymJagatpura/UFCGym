<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exclusive Membership Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;

      /* 🔴 CENTER GLOW */
      background: radial-gradient(circle at center, rgba(225, 6, 0, 0.35) 0%, #000 60%);

      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 40px;
      border-radius: 14px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 1px solid #1f1f1f;

      /* 🔥 CENTERED HALO GLOW */
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.9),
        0 0 60px rgba(225, 6, 0, 0.25),
        0 0 120px rgba(225, 6, 0, 0.15);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      letter-spacing: 1px;
      color: #ffffff;
    }

    p {
      font-size: 15px;
      color: #a1a1a1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .highlight {
      color: #ffffff;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #6b7280;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #1f1f1f;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #e10600;
    }

    .hidden {
      display: none;
      margin-top: 25px;
      font-size: 16px;
      color: #d1d5db;
    }

    .offer {
      margin-top: 15px;
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
    }

    .cta {
      margin-top: 10px;
    }

    .phone {
      color: #e10600;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .phone:hover {
      color: #ff3b30;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Exclusive Access</h1>

    <p>
      You have been selected for an <span class="highlight">Complimentary Annual Membership</span>
      at UFC Gym, Jagatpura.
    </p>

    <p>
      To proceed:<br>
      • Refer this to 10 members to activate your membership.<br>
      • Submit your details below
    </p>

<form onsubmit="handleSubmit(event)">
  <input type="text" id="name" placeholder="Full Name" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>
  <button type="submit">CONTINUE</button>
</form>

    <div id="result" class="hidden">
      😂 <strong>April Fool!</strong><br><br>
      But here’s something real 👇

      <div class="offer">
        Flat 35% OFF on Membership — Today Only
      </div>

      <div class="cta">
        <a href="tel:8764666699" class="phone">8764666699</a>
      </div>
    </div>

  </div>

 <script>
function handleSubmit(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  fetch("https://script.google.com/macros/s/AKfycbzugJtD0SHhe8N-JcQtwEBhq_wOo8fFL3IC-p2qO1mq9cxc7tRTeim7pwt5HiPxsy3X/exec", {
  method: "POST",
  mode: "no-cors",   // 🔥 THIS FIXES THE ISSUE
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    name: name,
    phone: phone
  })
});
  .then(res => res.text())
  .then(data => console.log("Success:", data))
  .catch(err => console.error("Error:", err));

  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
