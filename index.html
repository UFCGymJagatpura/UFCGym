<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exclusive Membership Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, rgba(225, 6, 0, 0.35) 0%, #000 60%);
      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 40px;
      border-radius: 14px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 1px solid #1f1f1f;
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.9),
        0 0 60px rgba(225, 6, 0, 0.25),
        0 0 120px rgba(225, 6, 0, 0.15);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    p {
      font-size: 15px;
      color: #a1a1a1;
      margin-bottom: 20px;
    }

    .highlight {
      color: #ffffff;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #1f1f1f;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #e10600;
    }

    .hidden {
      display: none;
      margin-top: 25px;
    }

    .offer {
      margin-top: 15px;
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
    }

    .phone {
      color: #e10600;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Exclusive Access</h1>

  <p>
    You have been selected for a <span class="highlight">Complimentary Annual Membership</span>
    at UFC Gym, Jagatpura.
  </p>

  <p>
    To proceed:<br>
    • Refer this to 10 members<br>
    • Submit your details below
  </p>

  <!-- FORM -->
  <form id="leadForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <button type="submit">CONTINUE</button>
  </form>

  <!-- RESULT -->
  <div id="result" class="hidden">
    😂 <strong>April Fool!</strong><br><br>

    <div class="offer">
      Flat 35% OFF on Membership — Today Only
    </div>

    <br>
    <a href="tel:8764666699" class="phone">8764666699</a>
  </div>

</div>

<script>
document.getElementById("leadForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  // SEND DATA TO GOOGLE SHEET
  fetch("https://script.google.com/macros/s/AKfycbzugJtD0SHhe8N-JcQtwEBhq_wOo8fFL3IC-p2qO1mq9cxc7tRTeim7pwt5HiPxsy3X/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      phone: phone
    })
  });

  // HIDE FORM
  document.getElementById("leadForm").style.display = "none";

  // SHOW RESULT
  document.getElementById("result").style.display = "block";

  // OPTIONAL: WHATSAPP OPEN
  // window.open(`https://wa.me/918764666699?text=Hi, my name is ${name}`, "_blank");
});
</script>

</body>
</html>
