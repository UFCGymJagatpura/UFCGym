<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exclusive Membership Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 40px;
      border-radius: 14px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 
  0 10px 40px rgba(0,0,0,0.8),
  0 0 25px rgba(225, 6, 0, 0.15),
  0 20px 60px rgba(225, 6, 0, 0.08);
      border: 1px solid #1f1f1f;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      letter-spacing: 1px;
      color: #ffffff;
    }

    p {
      font-size: 15px;
      color: #a1a1a1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .highlight {
      color: #ffffff;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #6b7280;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #1f1f1f;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #e10600; /* subtle premium red on hover */
    }

    .hidden {
      display: none;
      margin-top: 25px;
      font-size: 16px;
      color: #d1d5db;
    }

    .offer {
      margin-top: 15px;
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
    }

    .cta {
      margin-top: 10px;
      color: #e10600;
      font-weight: 500;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Exclusive Access</h1>

    <p>
      You have been selected for an <span class="highlight">Complimentary Annual Membership</span>
      at UFC Gym, Jagatpura.
    </p>

    <p>
      To proceed:<br>
      • Refer this to 10 members to activate your membership.<br>
      • Submit your details below
    </p>

    <form onsubmit="handleSubmit(event)">
      <input type="text" placeholder="Full Name" required>
      <input type="tel" placeholder="Phone Number" required>
      <button type="submit">CONTINUE</button>
    </form>

    <div id="result" class="hidden">
      😂 <strong>April Fool!</strong><br><br>
      But here’s something real 👇

      <div class="offer">
        Flat 35% OFF on Membership — Today Only
      </div>

      <div class="cta">
        8764666699
      </div>
    </div>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById("result").style.display = "block";
    }
  </script>

</body>
</html>
